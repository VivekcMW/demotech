name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  DATABASE_URL: postgres://postgres:postgres@localhost:5433/aarogya_ehr
  JWT_SECRET: test-jwt-secret-for-ci-only-min-32-chars-long
  PORT: 4000

jobs:
  lint-and-typecheck:
    name: Lint & TypeCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install backend dependencies
        run: npm ci
        working-directory: ./backend

      - name: TypeCheck backend
        run: npx tsc --noEmit
        working-directory: ./backend

      - name: Install frontend dependencies
        run: npm ci
        working-directory: ./web

      - name: Lint frontend
        run: npm run lint
        working-directory: ./web

      - name: TypeCheck frontend
        run: npx tsc --noEmit
        working-directory: ./web

  backend-tests:
    name: Backend API Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:14-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: aarogya_ehr
        ports: ["5433:5432"]
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install backend dependencies
        run: npm ci
        working-directory: ./backend

      - name: Run migrations
        run: npx drizzle-kit migrate
        working-directory: ./backend
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5433/aarogya_ehr

      - name: Seed database
        run: npm run db:seed
        working-directory: ./backend
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5433/aarogya_ehr

      - name: Start backend
        run: |
          nohup npx tsx src/index.ts > backend.log 2>&1 &
          sleep 5
          curl -f http://localhost:4000/health
        working-directory: ./backend
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5433/aarogya_ehr
          JWT_SECRET: test-jwt-secret-for-ci-only-min-32-chars-long
          PORT: 4000

      - name: Run API tests
        run: bash tests/api-test.sh
        working-directory: ./backend
        env:
          API_BASE: http://localhost:4000

  frontend-tests:
    name: Frontend E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci
        working-directory: ./web

      - name: Install Playwright
        run: npx playwright install --with-deps chromium
        working-directory: ./web

      - name: Build frontend
        run: npm run build
        working-directory: ./web

      - name: Start frontend
        run: |
          nohup npm run start > frontend.log 2>&1 &
          sleep 10
          curl -f http://localhost:3000
        working-directory: ./web

      - name: Run smoke tests
        run: npx playwright test --project=chromium e2e/smoke.spec.ts
        working-directory: ./web

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, backend-tests, frontend-tests]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: aarogya-backend:latest
          load: true

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./web
          push: false
          tags: aarogya-frontend:latest
          load: true